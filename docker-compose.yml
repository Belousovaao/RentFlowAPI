version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: rentflow-postgres
    restart: always
    environment:
      POSTGRES_DB: rentflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: RentFlow.Api/Dockerfile
    container_name: rentflow-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Db: Host=postgres;Port=5432;Database=rentflow;Username=postgres;Password=postgres

volumes:
  postgres_data: {}